<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="1024" height="1024" rx="220" fill="#FFF8F0"/>

  <!-- roof -->
  <path d="M 160 540 L 512 200 L 864 540 Z" fill="#7E3030"/>

  <!-- house body -->
  <rect x="220" y="540" width="584" height="340" rx="24" fill="#FF9E7C"/>

  <!-- clipboard sitting in front, centered like a sign -->
  <rect x="362" y="588" width="300" height="376" rx="24" fill="#E8B040"/>

  <!-- clip head -->
  <rect x="446" y="560" width="132" height="56" rx="12" fill="#527E45"/>
  <rect x="486" y="572" width="52" height="28" rx="6" fill="#7E3030"/>

  <!-- list rows on clipboard -->
  <!-- row 1 done -->
  <circle cx="412" cy="680" r="16" fill="#527E45"/>
  <path d="M 402 680 l 8 8 16 -18" fill="none" stroke="#FFF8F0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="442" y="668" width="174" height="22" rx="11" fill="#7E3030"/>

  <!-- row 2 done -->
  <circle cx="412" cy="740" r="16" fill="#527E45"/>
  <path d="M 402 740 l 8 8 16 -18" fill="none" stroke="#FFF8F0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="442" y="728" width="148" height="22" rx="11" fill="#7E3030"/>

  <!-- row 3 open -->
  <circle cx="412" cy="800" r="16" fill="none" stroke="#7E3030" stroke-width="5"/>
  <rect x="442" y="788" width="174" height="22" rx="11" fill="#FF9E7C"/>

  <!-- row 4 open -->
  <circle cx="412" cy="860" r="16" fill="none" stroke="#7E3030" stroke-width="5"/>
  <rect x="442" y="848" width="120" height="22" rx="11" fill="#FF9E7C"/>

  <!-- row 5 open -->
  <circle cx="412" cy="920" r="16" fill="none" stroke="#7E3030" stroke-width="5"/>
  <rect x="442" y="908" width="158" height="22" rx="11" fill="#FF9E7C"/>
</svg>
